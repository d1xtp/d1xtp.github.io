<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO | D1XTP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('images/banner.png') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
        }
        .bio-container {
            background-color: rgba(0, 0, 0, 0.212);
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            width: 100%;
            display: flex;
            align-items: center;
        }
        .avatar {
            width: 100px;
            height: 100px;
            background: url('images/avatar.jpg') no-repeat center;
            background-size: cover;
            border-radius: 10px;
            margin-right: 20px;
        }
        .bio-text {
            flex-grow: 1;
        }
        h1 {
            text-align: center;
            margin-top: 0;
        }
        p {
            margin: 10px 0;
        }
        .game-list {
            margin: 0;
            padding-left: 20px;
            padding-right: 10px;
            list-style-type: disc;
        }
        .game-list li {
            margin-bottom: 5px;
        }
        .buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .button {
            background-color: rgba(51, 51, 51, 0.411);
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            font-size: 100;
        }
        .button:hover {
            background-color: rgba(51, 51, 51, 0.411);
        }
        .telegram { background-color: rgba(51, 51, 51, 0.411); }
        .telegram:hover { background-color: rgba(51, 51, 51, 0.411); }
        .steam { background-color: rgba(51, 51, 51, 0.411); }
        .steam:hover { background-color: rgba(51, 51, 51, 0.411); }
        .github { background-color: rgba(51, 51, 51, 0.411); }
        .github:hover { background-color: #222; }
        .button::before {
            content: '';
            width: 27px;
            height: 27px;
            background-size: contain;
            background-repeat: no-repeat;
            display: inline-block;
        }
        .button.discord::before { background-image: url('images/discord.svg'); }
        .button.telegram::before { background-image: url('images/telegram.svg'); }
        .button.steam::before { background-image: url('images/steam.svg'); }
        .button.github::before { background-image: url('images/github.svg'); }

        /* Медиа-запрос для мобильных устройств */
        @media screen and (max-width: 600px) {
            body {
                background-attachment: scroll;
                background-size: contain;
                background-position: top center;
                padding: 10px;
            }
            .bio-container {
                max-width: 100%;
                padding: 15px;
                flex-direction: column;
                align-items: center;
            }
            .avatar {
                margin-right: 0;
                margin-bottom: 15px;
            }
            .bio-text {
                text-align: center;
            }
            .buttons {
                flex-wrap: wrap;
            }
            .button {
                margin: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="bio-container">
        <div class="avatar"></div>
        <div class="bio-text">
            <h1>BIO | D1XTP</h1>
            <p>Nickname: D1XTP</p>
            <p>Gender: Male | He/His</p>
            <p>Name: ???</p>
            <p>Age: 1?</p>
            <p>Favorite games:</p>
            <ul class="game-list">
                <li>Minecraft — nickname D1XTP</li>
                <li>DDraceNetwork — nickname катарак</li>
            </ul>
            <p>TimeZone: MSK +3 UTC</p>
            <div class="buttons">
                <a href="https://discord.com/users/767309831748452373" class="button discord"></a>
                <a href="https://t.me/d1xtp" class="button telegram"></a>
                <a href="https://steamcommunity.com/id/D1XTP" class="button steam"></a>
                <a href="https://github.com/d1xtp" class="button github"></a>
            </div>
        </div>
    </div>
</body>
</html>
